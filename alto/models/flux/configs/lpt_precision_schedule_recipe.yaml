training_stage:
  lpt_modifiers:
    LowPrecisionTrainingModifier:
      # The base scheme controls which weight wrapper is installed.  Use mxfp4
      # here because it can dispatch scheduled bf16/mxfp4/mxfp8/nvfp4 linear ops.
      scheme: "mxfp4"
      targets: ["Linear"]
      ignore:
        - "re:^img_in\\."
        - "re:^txt_in\\."
        - "re:^time_in\\."
        - "re:^vector_in\\."
        - "re:.*_mod\\.lin"
        - "re:.*modulation\\.lin"
        - "re:.*final_layer.*"
      use_2dblock_x: false
      use_2dblock_w: true
      use_hadamard: false
      use_sr_grad: false
      use_dge: false
      clip_mode: none
      two_level_scaling: tensorwise
      mxfp4_scale_selection: mse_4_6_shifted
      precision_schedule:
        # Step ranges are [start_step, end_step). Training steps start from 1.
        # Edit these boundaries to control low-precision warmup/cooldown phases.
        # - precision: bf16
        #   start_step: 1
        #   end_step: 1001
        - precision: mxfp4
          start_step: 1
          end_step: 24001
        - precision: bf16
          start_step: 24001

