training_stage:
  lpt_modifiers:
    LowPrecisionTrainingModifier:
      scheme: "mxfp8_e4m3"
      targets: ["Linear"]
      ignore:
        # Keep the same Flux exclusions as the FP4 recipes. These conditioning
        # and output layers are small and less representative of the main DiT GEMMs.
        # - "re:^img_in\\."
        # - "re:^txt_in\\."
        - "re:^time_in\\."
        - "re:^vector_in\\."
        - "re:.*_mod\\.lin"
        - "re:.*modulation\\.lin"
        - "re:.*final_layer.*"
      use_2dblock_x: false
      use_2dblock_w: true
      use_hadamard: false
      use_sr_grad: false
      use_dge: false
      clip_mode: none
      two_level_scaling: none
