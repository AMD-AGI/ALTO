training_stage:
  lpt_modifiers:
    LowPrecisionTrainingModifier:
      scheme: "nvfp4"
      targets: ["Linear"]
      ignore:
        # Keep the same Flux exclusions as MXFP4. These layers are small
        # conditioning/final-projection paths where FP4 noise is higher risk.
        - "re:^time_in\\."
        - "re:^vector_in\\."
        - "re:.*_mod\\.lin"
        - "re:.*modulation\\.lin"
        - "re:.*final_layer.*"
      use_2dblock_x: false
      use_2dblock_w: true
      use_hadamard: false
      use_sr_grad: false
      use_dge: false
      clip_mode: none
      two_level_scaling: tensorwise
