training_stage:
  lpt_modifiers:
    LowPrecisionTrainingModifier:
      scheme: "mxfp4"
      targets: ["Linear", "GptOssGroupedExperts"]
      ignore: ["output", "re:.*\\.router\\.gate"]
      use_2dblock_x: false
      use_2dblock_w: true
      use_hadamard: true
      use_sr_grad: true
      use_dge: false
      clip_mode: none
      two_level_scaling: none
    GradientClippingModifier:
      targets: ["Linear"]
      ignore: ["output", "re:.*\\.router\\.gate"]
      clip_grad_output: true
      grad_output_max_norm: 1.0
      grad_output_clip_value: null
      clip_grad_weight: true
      grad_weight_max_norm: 1.0
      grad_weight_clip_value: null
  debug_modifiers:
    DebugObserverModifier:
      targets: ["Linear", "GptOssGroupedExperts"]
      ignore: ["output", "re:.*\\.router\\.gate"]
      capture_every: 1
      max_captures: 10
      output_path: "./outputs/debug_obs_grad_clip_lpt.pt"
      capture_input: true
      capture_weight: true
      capture_grad_output: true
      capture_grad_weight: true
