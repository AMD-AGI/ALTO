training_stage:
  lpt_modifiers:
    LowPrecisionTrainingModifier:
      scheme: "mxfp4_adahop"
      targets: ["Linear"]
      ignore: ["output"]
      use_2dblock_x: false
      use_2dblock_w: true
      use_hadamard: false
      use_sr_grad: true
      use_dge: false
      clip_mode: none
      two_level_scaling: none
    AdaHOPModifier:
      enabled: true
      use_hadamard: true
      use_randomized_hadamard: false
      calibration_steps: 30
      layer_transform_config:
        "row-row": "hadamard"
        "row-none": "inner_outlier_extract_left"
        "row-col": "inner_outlier_extract_right"
        "col-row": "hadamard"
        "col-none": "hadamard"
        "col-col": "full_precision"
        "none-row": "hadamard"
        "none-none": "hadamard"
        "none-col": "inner_outlier_extract_right"
  moe_lpt_modifiers:
    LowPrecisionTrainingModifier:
      scheme: "mxfp4"
      targets: ["GptOssGroupedExperts"]
      ignore: ["re:.*\\.router\\.gate"]
      use_2dblock_x: false
      use_2dblock_w: true
      use_hadamard: true
      use_sr_grad: true
      use_dge: false
      clip_mode: none
      two_level_scaling: none

