training_stage:
  lpt_modifiers:
    LowPrecisionTrainingModifier:
      # MXFP4 all-layers recipe (twin of lpt_recipe_nvfp4_alllayers.yaml) used
      # by the 16k-step from-scratch GPT-OSS-20B workload
      # (RUN_TAG mxfp4_alllayers_8gpu_16k_20260608_090747).  The ONLY intended
      # difference vs the NVFP4 twin is the scheme and its intrinsic scaling
      # (MXFP4 = E8M0 power-of-two block scale, no two-level outer scale).
      scheme: "mxfp4"
      targets: ["Linear", "GptOssGroupedExperts"]
      ignore:
        - "output"
        - "re:.*\\.router\\.gate"
      use_2dblock_x: false
      use_2dblock_w: true
      use_hadamard: true
      use_sr_grad: true
      use_dge: false
      clip_mode: none
      two_level_scaling: none
      lora_rank: 0
