training_stage:
  lpt_modifiers:
    LowPrecisionTrainingModifier:
      # Version-controlled copy of /wekafs/zhitwang/recipes/nvfp4_4o6_alllayers_rank0.yaml
      # EXACT twin of lpt_recipe_nvfp4_alllayers.yaml (the NVFP4 mlperf1.2M / ktktq
      # run recipe) with ONLY Four Over Six enabled, so any delta vs the NVFP4
      # baseline is attributable to 4/6 alone.  4/6 acts on ACTIVATIONS ONLY
      # (dense Linear path); weights, gradients and MoE experts stay standard NVFP4.
      scheme: "nvfp4"
      targets: ["Linear", "GptOssGroupedExperts"]
      ignore:
        - "output"
        - "re:.*\\.router\\.gate"
      use_2dblock_x: false
      use_2dblock_w: true
      use_hadamard: true
      use_sr_grad: true
      use_dge: false
      clip_mode: none
      two_level_scaling: tensorwise
      use_4o6: true
      select_metric: mae
      lora_rank: 0
