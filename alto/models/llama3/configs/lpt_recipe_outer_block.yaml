training_stage:
  lpt_modifiers:
    LowPrecisionTrainingModifier:
      scheme: "nvfp4"
      targets: ["Linear"]
      ignore: ["output"]
      # Paper-recipe weight inner block (1x16) — matches TetraJet-v2 default.
      # See NVFP4_Outer_Block_Review.md §6.3 P0-1 / Tab. 8a (1x16: 31.49 vs
      # 16x16: 31.74 PPL on OLMo-2-150M / 52B tokens).
      use_2dblock_x: false
      use_2dblock_w: false
      use_hadamard: false
      use_sr_grad: false
      use_dge: false
      two_level_scaling: "outer_block"
      # 1xK outer scale for activations, 1xK outer scale for weights with 2D
      # outer block (axis-invariant → share with axis=0 QDQ in wgrad path).
      use_outer_2dblock_x: false
      use_outer_2dblock_w: true
      outer_block_size: 128
