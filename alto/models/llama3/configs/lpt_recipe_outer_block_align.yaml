training_stage:
  lpt_modifiers:
    LowPrecisionTrainingModifier:
      scheme: "nvfp4"
      targets: ["Linear"]
      ignore: ["output"]
      # (C+align): TetraJet-v2 X̂ alignment recipe.  Reuse the forward
      # axis=-1 QDQ of X as the wgrad-axis view, avoiding the second
      # independent axis=0 QDQ.  See NVFP4_Outer_Block_Review.md §6.3 P0-2.
      use_2dblock_x: false
      use_2dblock_w: false
      use_hadamard: false
      use_sr_grad: false
      use_dge: false
      two_level_scaling: "outer_block"
      use_outer_2dblock_x: false
      use_outer_2dblock_w: true
      outer_block_size: 128
      align_x_forward_wgrad: true
