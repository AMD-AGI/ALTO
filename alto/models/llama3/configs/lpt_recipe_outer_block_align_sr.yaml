training_stage:
  lpt_modifiers:
    LowPrecisionTrainingModifier:
      scheme: "nvfp4"
      targets: ["Linear"]
      ignore: ["output"]
      # (C+sr): (C+align) + stochastic rounding on gradient QDQ.  Matches
      # TetraJet-v2 §2.1 (RTN forward + SR backward) unbiased recipe.
      use_2dblock_x: false
      use_2dblock_w: false
      use_hadamard: false
      use_sr_grad: true
      use_dge: false
      two_level_scaling: "outer_block"
      use_outer_2dblock_x: false
      use_outer_2dblock_w: true
      outer_block_size: 128
      align_x_forward_wgrad: true
