base:
  seed: &seed 42

model:
  type: Llama
  path: /group/archive_dataset_6_nobkup/archive_modelzoo/sequence_learning/weights/nlp-pretrained-model/meta-llama/Llama-3.2-1B
  torch_dtype: auto

eval:
  eval_perplexity:
    data_configs:
      - dataset:
          name: wikitext
          subset_name: wikitext-2-raw-v1
          split: test
          download: True
          download_mode: reuse_dataset_if_exists
          cache_dir: /group/ossdphi_algo_scratch_13/guanchen/datasets/calibration/wikitext2
          hf_context_key: text
        processing:
          bs: 1
          seq_len: 2048
          preproc: test_jointdoc
          preproc_kwargs:
            sep: '\n\n'
    eval_type: [prefill]
  eval_checkpoints: [pretrained, transformed]

optimization:
  quantization:
    method: RTN
    weight:
      quant_dtype: int
      bit: 4
      symmetric: True
      granularity: per_tensor
    act:
      quant_dtype: int
      bit: 4
      symmetric: True
      granularity: per_tensor
        
save:
