[job]
dump_folder = "./outputs"
description = "Llama 3 1B training"
print_config = false
custom_config_module = "modeloptimizer.config.job_config"

[profiling]
enable_profiling = false
save_traces_folder = "profile_trace"
profile_freq = 100

[metrics]
log_freq = 1
enable_tensorboard = true
save_tb_folder = "tb"

[model]
name = "llama3"
flavor = "1B"
hf_assets_path = "/group/archive_dataset_6_nobkup/archive_modelzoo/sequence_learning/weights/nlp-pretrained-model/meta-llama/Llama-3.2-1B"
converters = ["modeloptimizer"]

[modeloptimizer]
recipe = "./modeloptimizer/models/llama3/configs/recipe.yaml"

[training]
dtype = "float32"
local_batch_size = 1
global_batch_size = 10
seq_len = 8192
steps = 2
dataset = "c4_test"

[debug]
seed = 1234

[parallelism]
data_parallel_replicate_degree = 1
data_parallel_shard_degree = -1
tensor_parallel_degree = 1
pipeline_parallel_degree = 1
context_parallel_degree = 1

[checkpoint]
enable = true
folder = "checkpoint"
interval = 10
last_save_model_only = true
export_dtype = "float32"
async_mode = "disabled"
initial_load_path = "/group/archive_dataset_6_nobkup/archive_modelzoo/sequence_learning/weights/nlp-pretrained-model/meta-llama/Llama-3.2-1B"
initial_load_in_hf = true

[compile]
enable=false

[activation_checkpoint]
mode = "none"

[validation]
enable = true
dataset = "wikitext_test"
freq = 1
local_batch_size = 1
seq_len = 8192
steps = 10
