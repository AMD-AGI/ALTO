quantization_stage:
  quantization_modifiers:
    QuantizationModifier:
      ignore: ["output"]
      config_groups:
        group_0:
          weights:
            num_bits: 4
            type: "int"
            symmetric: false
            strategy: "tensor_group"
            group_size: 128
          input_activations:
            num_bits: 8
            type: "int"
            symmetric: false
            strategy: "tensor_group"
            group_size: 128
            observer: "minmax"
          targets: ["Linear"]
