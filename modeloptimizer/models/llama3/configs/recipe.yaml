sparsity_stage:
  sparsity_modifiers:
    WandaPruningModifier:
      sparsity: 0.5
      mask_structure: "2:4"
      # sparsity_profile: "owl"
      # owl_m: 5
      # owl_lmbda: 0.05
      targets: ["Linear"]
      ignore: ["output"]
quantization_stage:
  quantization_modifiers:
    QuantizationModifier:
      ignore: ["output"]
      config_groups:
        group_0:
          weights:
            num_bits: 8
            type: "int"
            symmetric: true
            strategy: "tensor"
          input_activations:
            num_bits: 8
            type: "int"
            symmetric: true
            strategy: "tensor"
            observer: "minmax"
          targets: ["Linear"]
